name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # 锁文件安装失败本身是仓库问题(AGENTS.md),不允许回退无锁安装
      - name: Install (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test --run

      # 生产语义差分:__DEV__=false 下跑同一套测试(dev 断言/告警被 DCE),
      # 防 dev-only 分支掩盖 prod 行为漂移(排除清单见 vitest.prod.config.ts)
      - name: Test (production semantics)
        run: pnpm test:prod

      - name: Type check
        run: pnpm type-check

      - name: Build
        run: pnpm build

      - name: Coverage
        run: pnpm exec vitest run --coverage
